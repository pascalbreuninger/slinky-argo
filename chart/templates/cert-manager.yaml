apiVersion: management.loft.sh/v1
kind: ArgoCDApplication
metadata:
  name: {{ include "slinky.namePrefix" . }}-cert-manager
  namespace: {{ include "slinky.projectNamespace" . }}
  labels:
    loft.sh/argocd-application-id: cert-manager
    {{- include "slinky.commonLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
    loft.sh/argocd-connector: {{ .Values.loft.connector }}
spec:
  displayName: cert-manager
  destination:
    virtualCluster:
      name: {{ .Values.loft.virtualClusterName }}
      target: vCluster
      namespace: {{ .Values.certManager.namespace }}
  template:
    spec:
      project: {{ .Values.argoCDProject }}
      source:
        repoURL: https://charts.jetstack.io
        chart: cert-manager
        targetRevision: {{ .Values.certManager.version }}
        helm:
          releaseName: cert-manager
          valuesObject:
            crds:
              enabled: true
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
