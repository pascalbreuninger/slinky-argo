apiVersion: management.loft.sh/v1
kind: ArgoCDApplication
metadata:
  name: {{ include "slinky.namePrefix" . }}-slurm
  namespace: {{ include "slinky.projectNamespace" . }}
  labels:
    loft.sh/argocd-application-id: slurm
    {{- include "slinky.commonLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    loft.sh/argocd-connector: {{ .Values.loft.connector }}
spec:
  displayName: slurm
  destination:
    virtualCluster:
      name: {{ .Values.loft.virtualClusterName }}
      target: vCluster
      namespace: {{ .Values.slurm.namespace }}
  template:
    spec:
      project: {{ .Values.argoCDProject }}
      source:
        repoURL: ghcr.io/slinkyproject/charts
        chart: slurm
        targetRevision: {{ .Values.slurm.version }}
        helm:
          releaseName: slurm
          valuesObject:
            clusterName: {{ .Values.slurm.clusterName }}
            controller:
              persistence:
                enabled: {{ .Values.slurm.controller.persistence.enabled }}
            accounting:
              enabled: {{ .Values.slurm.accountingEnabled }}
            loginsets:
              slinky:
                enabled: true
            nodesets:
              slinky:
                replicas: {{ .Values.slurm.nodeset.replicas }}
                scalingMode: StatefulSet
                updateStrategy:
                  type: RollingUpdate
                  rollingUpdate:
                    maxUnavailable: 1
            restapi:
              replicas: {{ .Values.slurm.restapi.replicas }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
